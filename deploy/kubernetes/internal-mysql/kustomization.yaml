namespace: crest-internal

resources:
  - namespace.yaml
  - ../base
  - mysql.yaml

configMapGenerator:
  - name: crest-env
    literals:
      - CREST_CONTEXT_PATH=
      - CREST_DB_HOST=crest-mysql
      - CREST_DB_PORT=3306
      - CREST_DB_NAME=crest
      - CREST_DB_PARAMS=autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - CREST_ORIGIN_LIST=http://localhost:8100
      - CREST_LOGIN_TIMEOUT=960
  - name: crest-mysql-init
    files:
      - 01-init.sql=mysql-init.sql
      - my.cnf=mysql-my.cnf

secretGenerator:
  - name: crest-db-secret
    literals:
      - CREST_DB_USERNAME=root
      - CREST_DB_PASSWORD=<set-strong-password-before-apply>
      - MYSQL_ROOT_PASSWORD=<set-strong-password-before-apply>
      - CREST_AES_KEY=<set-32-character-aes-key>
      - CREST_AES_IV=<set-16-character-aes-iv>
      - CREST_INITIAL_PASSWORD=<set-initial-admin-password>

generatorOptions:
  disableNameSuffixHash: true
