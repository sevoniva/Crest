# 基础配置
DE_BASE=/opt
DE_PORT=8100
DE_LOGIN_TIMEOUT=960
DE_CONTEXT_PATH=
# 离线包制作脚本会写入明确版本的应用镜像标签。
DE_APP_IMAGE=ghcr.io/sevoniva/crest:v1.3.0
DE_MYSQL_IMAGE=mysql:8.4.5

# 数据库配置
DE_MYSQL_HOST=mysql-crest
DE_MYSQL_PORT=3306
DE_MYSQL_DB=crest
DE_MYSQL_USER=root
DE_MYSQL_PASSWORD=
DE_MYSQL_PARAMS="autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true"

# 留空时安装脚本会生成随机值；升级已有环境时不要改动。
DE_AES_KEY=
DE_AES_IV=
DE_INITIAL_PASSWORD=

# 运行目录派生路径；留空时安装脚本会按 DE_BASE 自动生成。
DE_LOG_PATH=
DE_CACHE_PATH=

# 导出限制
DE_EXPORT_VIEWS_LIMIT=100000
DE_EXPORT_DATASET_LIMIT=100000
DE_ORIGIN_LIST="http://localhost:8100"
