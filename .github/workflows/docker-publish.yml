name: Build and Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: DataEase image tag to publish
        required: false
        default: v2.10.22-ob

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ inputs.image_tag || 'v2.10.22-ob' }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sevoniva/dataease-2.10.22

jobs:
  build-dataease:
    name: Build and publish DataEase image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            core/core-frontend/package-lock.json
            core/core-frontend/flushbonading/package-lock.json

      - name: Build frontend
        working-directory: core/core-frontend
        run: |
          npm ci
          npm run build:base
          npm run build:lite:check

      - name: Build backend
        run: |
          mvn -pl :core-backend -am clean package -Pstandalone -DskipTests -Dmaven.test.skip=true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push DataEase image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/sevoniva/dataease-2.10.22
            org.opencontainers.image.description=DataEase 2.10.22 fork with OceanBase Oracle support
            org.opencontainers.image.licenses=GPL-3.0
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}:main
            ${{ env.IMAGE_PREFIX }}:sha-${{ github.sha }}
