spring:
  datasource:
    url: ${CREST_DB_URL:jdbc:mysql://127.0.0.1:3306/crest?autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${CREST_DB_USERNAME:root}
    password: ${CREST_DB_PASSWORD:}
  messages:
    basename: i18n/lic,i18n/core,i18n/permissions,i18n/sync
  flyway:
    enabled: true
    table: de_standalone_version
    validate-on-migrate: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

logging:
  level:
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  mapper-locations: classpath:mybatis/*.xml

crest:
  internal-lite:
    enabled: true
