
spring:

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:/opt/crest/desktop;AUTO_SERVER=TRUE;AUTO_RECONNECT=TRUE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DATABASE_TO_UPPER=FALSE
    username: sa
    password: 123456

  h2:
    console:
      enabled: true
      path: /h2-console
  messages:
    basename: i18n/core
  flyway:
    enabled: true
    table: de_desktop_version
    validate-on-migrate: false
    locations: classpath:db/desktop
    baseline-on-migrate: true
    out-of-order: false

logging:
  level:
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR

mybatis-plus:
  mapper-locations: classpath:mybatis/*.xml

crest:
  internal-lite:
    enabled: true
